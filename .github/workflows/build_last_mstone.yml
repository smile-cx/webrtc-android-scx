name: Release last SmileCX WebRTC milestone

# This workflow builds modified WebRTC with SmileCX symbol prefixing.
# Modifications documented in: patches/MODIFICATIONS.md and NOTICE
# License compliance: LICENSE.md contains all required license texts

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:  

env:  
  current_release_milestone:
  current_release_branch:
  next_release_milestone:
  next_release_branch:
  should_build: ${{ false }}
  next_release_tag:
  next_release_name:

jobs:
  
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: GH Auth
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} >> token.txt
          gh auth login --with-token < token.txt
          rm token.txt          
      
      - name: Getting WebRTC release
        run: |
          # Get latest release info
          LATEST_RELEASE=$(gh api repos/${{ github.repository }}/releases | jq -r '.[0]')
          LATEST_TAG=$(echo "$LATEST_RELEASE" | jq -r '.tag_name')
          LATEST_BODY=$(echo "$LATEST_RELEASE" | jq -r '.body')

          # Extract milestone from tag (e.g., "146" from tag "146")
          current_release_milestone=$LATEST_TAG

          # Extract branch from release notes (e.g., "7680" from "WebRTC Version: 146.7680.0")
          if echo "$LATEST_BODY" | grep -q "WebRTC Version:"; then
            FULL_VERSION=$(echo "$LATEST_BODY" | grep "WebRTC Version:" | head -1 | sed 's/.*WebRTC Version: //' | tr -d ' ')
            IFS='.' read -ra VERSION_PARTS <<< "$FULL_VERSION"
            current_release_branch=${VERSION_PARTS[1]:-0}
            echo "Found current release: M$current_release_milestone (branch $current_release_branch)"
          else
            echo "⚠️ Could not parse branch from release notes, assuming 0"
            current_release_branch=0
          fi

          # Get next stable milestone
          milestones=$( curl -sL "https://chromiumdash.appspot.com/fetch_milestones" | jq -r 'map(select(.schedule_phase | . != null) | select(.schedule_phase=="stable" or .schedule_phase=="stable_cut"))' )

          echo "current_release_milestone=$current_release_milestone" >> $GITHUB_ENV
          echo "current_release_branch=$current_release_branch" >> $GITHUB_ENV
          echo "next_release_milestone=$(echo $milestones  | jq -r ".[0].milestone")" >> $GITHUB_ENV
          echo "next_release_branch=$(echo $milestones  | jq -r ".[0].webrtc_branch")" >> $GITHUB_ENV
          
      - name: Setup enviroment
        run: |
          echo "should_build=${{ env.next_release_branch > env.current_release_branch }}" >> $GITHUB_ENV
          echo "next_release_name=${{ env.next_release_milestone }}" >> $GITHUB_ENV
          echo "next_release_tag=${{ env.next_release_milestone }}" >> $GITHUB_ENV
          echo "next_full_version=${{ env.next_release_milestone }}.${{ env.next_release_branch }}.0" >> $GITHUB_ENV

      - name: Check if release exists and needs update
        id: check_release
        run: |
          # This runs AFTER should_build is determined by branch comparison
          # should_build=true means new branch available (need full rebuild)
          # should_build=false means same branch (can reuse AAR if exists)

          if [ "${{ env.should_build }}" = "true" ]; then
            echo "New branch ${{ env.next_release_branch }} available - will rebuild from scratch"
            echo "has_existing_aar=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # should_build=false, check if we can reuse existing AAR
          if gh release view "${{ env.next_release_tag }}" > /dev/null 2>&1; then
            echo "Release ${{ env.next_release_tag }} exists with same branch"

            # Try to download existing AAR
            if gh release download "${{ env.next_release_tag }}" -p "libscxwebrtc.aar" --clobber 2>/dev/null; then
              echo "✓ Found existing AAR in release"
              echo "has_existing_aar=true" >> $GITHUB_OUTPUT

              # Check if already shadowed
              unzip -q libscxwebrtc.aar -d check/
              if jar -tf check/classes.jar | grep -q "cx/smile/org/webrtc"; then
                echo "✓ AAR is already shadowed - nothing to do"
                echo "already_shadowed=true" >> $GITHUB_OUTPUT
              else
                echo "AAR exists but not shadowed - will apply shadowing"
                echo "already_shadowed=false" >> $GITHUB_OUTPUT
              fi
              rm -rf check/
            else
              echo "Release exists but no AAR found"
              echo "has_existing_aar=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Release does not exist for this milestone"
            echo "has_existing_aar=false" >> $GITHUB_OUTPUT
          fi

      - name: Maximize build disk space (1)
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_aar != 'true'
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'

      - name: Maximize build space (2)
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_aar != 'true'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Checkout WebRTC
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_aar != 'true'
        run: |
          source "${GITHUB_WORKSPACE}/scripts/checkout_webrtc.sh";
          echo "${PATH}" >> $GITHUB_PATH
          echo ::set-output name=should_build::false
        env:
          WEBRTC_BRANCH: ${{ env.next_release_branch  }}

      - name: Apply SmileCX patches
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_aar != 'true'
        run: |
          cd src
          echo "Applying jni_prefix_smile patch with fuzzy matching..."
          echo "This modifies upstream WebRTC source files - see patches/MODIFICATIONS.md"

          # Try git apply first (more forgiving)
          if git apply --check --verbose "${GITHUB_WORKSPACE}/patches/jni_prefix_smile.patch" 2>&1; then
            echo "Using git apply..."
            git apply "${GITHUB_WORKSPACE}/patches/jni_prefix_smile.patch"
          else
            echo "git apply failed, trying patch with fuzz..."
            # Fall back to patch with fuzzy matching (allows 3 lines of context mismatch)
            patch -p1 --fuzz=3 --verbose < "${GITHUB_WORKSPACE}/patches/jni_prefix_smile.patch" || {
              echo "❌ Patch failed!"
              echo "Showing reject files:"
              find . -name "*.rej" -exec echo "=== {} ===" \; -exec cat {} \;
              exit 1
            }
          fi

          echo "✓ Patch applied successfully!"
          echo "Verifying patch application..."
          grep -q "scxjingle_peerconnection_so" sdk/android/api/org/webrtc/PeerConnectionFactory.java && echo "✓ Library name updated" || echo "✗ Library name NOT updated"
          grep -q "Java_cx_smile_org_webrtc" sdk/android/src/jni/jni_helpers.h && echo "✓ JNI helpers updated" || echo "✗ JNI helpers NOT updated"

      - name: Build WebRTC
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_aar != 'true'
        run: |
          cd src
          source "${GITHUB_WORKSPACE}/scripts/build_webrtc.sh"

      - name: Create SDK (base AAR)
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_aar != 'true'
        run: |
          mv ./src/libscxwebrtc.aar .

      - name: Set up JDK 17 for shadowing
        if: (env.should_build == 'true' || steps.check_release.outputs.has_existing_aar == 'true') && steps.check_release.outputs.already_shadowed != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Apply shadowing to AAR
        if: (env.should_build == 'true' || steps.check_release.outputs.has_existing_aar == 'true') && steps.check_release.outputs.already_shadowed != 'true'
        run: |
          echo "Shadowing WebRTC classes in AAR..."

          # Extract base AAR
          mkdir -p aar-extract
          unzip -q libscxwebrtc.aar -d aar-extract/

          # Prepare shadow module
          rm -rf android-scx/shadow/libs/*
          mkdir -p android-scx/shadow/libs
          cp aar-extract/classes.jar android-scx/shadow/libs/

          # Run shadow JAR creation
          ./gradlew :android-scx:shadow:shadowJar -PVERSION_NAME=${{ env.next_release_tag }}

          # Replace classes.jar with shadowed version
          cp android-scx/shadow/build/libs/webrtc-shadowed.jar aar-extract/classes.jar

          # Repackage AAR with shadowed classes
          cd aar-extract
          zip -q -r ../libscxwebrtc-shadowed.aar *
          cd ..

          # Replace original AAR with shadowed version
          mv libscxwebrtc-shadowed.aar libscxwebrtc.aar

          echo "✓ Shadowed AAR created"

          # Verify shadowing
          echo "Verifying shadowed classes..."
          unzip -q -o libscxwebrtc.aar -d verify/
          if jar -tf verify/classes.jar | grep -q "cx/smile/org/webrtc"; then
            echo "✓ Shadowed classes found:"
            jar -tf verify/classes.jar | grep "cx/smile/org/webrtc" 2>/dev/null | head -5
          else
            echo "⚠️ Warning: No shadowed classes found"
          fi
          rm -rf verify/

      - name: Create and push tags
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_aar != 'true'
        run: |
          git config --local user.email "${{ github.actor }}[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Create/update milestone tag (force to allow updates)
          git tag -f "${{ env.next_release_tag }}"

          # Push milestone tag
          git push -f origin "${{ env.next_release_tag }}"

      - name: Create or update release
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_aar != 'true'
        run: |
          echo "WebRTC Version: ${{ env.next_full_version }}" >> changelog.md
          echo "" >> changelog.md
          echo "WebRTC Branch: [branch-heads/${{ env.next_release_branch }}](https://chromium.googlesource.com/external/webrtc/+log/branch-heads/${{ env.next_release_branch }})" >> changelog.md

          # Check if release exists
          if gh release view "${{ env.next_release_tag }}" > /dev/null 2>&1; then
            echo "Updating existing release with new build..."
            gh release upload "${{ env.next_release_tag }}" libscxwebrtc.aar LICENSE.md NOTICE --clobber
            echo "✓ Release updated"
          else
            echo "Creating new release..."
            gh release create "${{ env.next_release_tag }}" -t "${{ env.next_release_milestone }}" -F changelog.md "libscxwebrtc.aar" LICENSE.md NOTICE
            echo "✓ Release created"
          fi

      # Optional: Trigger JitPack to republish the already-shadowed AAR
      # You can disable this if you only need the GitHub release artifact
      # - name: Trigger JitPack build
      #   if: env.should_build == 'true'
      #   run: |
      #     echo "Triggering JitPack build for version ${{ env.next_release_tag }}"
      #     curl -s "https://jitpack.io/api/builds/com.github.smile-cx/webrtc-android-scx/${{ env.next_release_tag }}"
      #     echo "JitPack build triggered. Check status at: https://jitpack.io/com/github/smile-cx/webrtc-android-scx/${{ env.next_release_tag }}/build.log"
