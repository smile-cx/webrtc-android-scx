# JitPack configuration
# Note: The AAR from GitHub releases is already shadowed by the workflow.
# JitPack just republishes it as a Maven artifact.

jdk:
  - openjdk17

before_install:
  - echo "JitPack republishing pre-shadowed AAR"

install:
  - echo "Downloading pre-shadowed AAR from GitHub releases..."
  - |
    # Extract version from git tag
    VERSION=${JITPACK_GIT_TAG:-${JITPACK_VERSION:-${JITPACK_COMMIT}}}
    if [ -z "$VERSION" ]; then
      VERSION=$(git describe --tags --exact-match 2>/dev/null || git rev-parse --short HEAD)
    fi

    echo "Publishing version: $VERSION"

    # Download pre-shadowed AAR from GitHub release
    wget "https://github.com/smile-cx/webrtc-android-scx/releases/download/${VERSION}/libscxwebrtc.aar" -O libscxwebrtc.aar || {
      echo "Failed to download AAR for version ${VERSION}"
      exit 1
    }

    # Extract AAR contents (already shadowed)
    echo "Extracting pre-shadowed AAR..."
    unzip -o libscxwebrtc.aar -d extracted/

    # Copy to module structure for republishing
    mkdir -p android-scx/shadow/libs
    cp extracted/classes.jar android-scx/shadow/libs/

    mkdir -p android-scx/src/main/jniLibs
    cp -r extracted/jni/* android-scx/src/main/jniLibs/

    rm -rf extracted/

    # Verify it's already shadowed
    echo "Verifying shadowed classes..."
    jar -tf android-scx/shadow/libs/classes.jar | grep "cx/smile/org/webrtc" | head -3 || echo "⚠️ Warning: Not shadowed"

    # Publish to Maven
    echo "Publishing to Maven..."
    ./gradlew :android-scx:assembleRelease :android-scx:publishToMavenLocal -PVERSION_NAME=${VERSION}
